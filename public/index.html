<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSFW Shield • AI Detector</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="logo">
          <span class="shield">🛡️</span>
          <h1>NSFW(NOT SAFE FOR WORK) DETECTOR </h1>
        </div>
        <p class="subtitle">AI-Powered Adult Content Detector</p>
      </div>

      <div id="uploadArea" class="upload-area">
        <input type="file" id="imageUpload" accept="image/*" hidden>
        <div class="upload-content">
          <div class="upload-icon">📸</div>
          <h3>Drop image here</h3>
          <p>or</p>
          <button class="browse-btn">Browse Files</button>
          <p class="supported">Supported: JPG, PNG, WEBP</p>
        </div>
      </div>

      <div class="preview-container" id="previewContainer" style="display: none;">
        <img id="preview" alt="Preview">
        <button id="removeBtn" class="remove-btn">✕</button>
      </div>

      <button onclick="uploadImage()" class="predict-btn" id="analyzeBtn" disabled>
        Analyze Image
      </button>

      <div id="result" class="result"></div>
    </div>

    <div class="footer">
      <p>Powered by TensorFlow.js • Model: NSFW MobileNet</p>
    </div>
    <div style="text-align: center; margin-bottom: 20px;">
  <a href="about.html" style="color: #a5b4fc; text-decoration: none; font-weight: 500;">
    About This Project
  </a>
</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
