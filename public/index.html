<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSFW Shield • AI Detector</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="logo">
          <span class="shield">🛡️</span>
          <h1>NSFW Shield</h1>
        </div>
        <p class="subtitle">AI-Powered Adult Content Detector</p>
      </div>

      <div id="uploadArea" class="upload-area">
        <input type="file" id="imageUpload" accept="image/*" hidden>
        <div class="upload-content">
          <div class="upload-icon">📸</div>
          <h3>Drop image here</h3>
          <p>or</p>
          <button class="browse-btn">Browse Files</button>
          <p class="supported">JPG, PNG, WEBP • Max 50MB</p>
        </div>
      </div>

      <div class="preview-container" id="previewContainer" style="display: none;">
        <img id="preview" alt="Preview">
        <button id="removeBtn" class="remove-btn">✕</button>
      </div>

      <button onclick="uploadImage()" class="predict-btn" id="analyzeBtn" disabled>
        Analyze Image
      </button>

      <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Analyzing image... Please wait</p>
      </div>

      <div id="result" class="result"></div>

      <div class="history-section" id="historySection" style="display: none;">
        <h3>Recent Scans</h3>
        <div id="historyList" class="history-list"></div>
      </div>
    </div>

    <div class="footer">
      <p>Powered by TensorFlow.js • 100% Private • No images are uploaded</p>
      <a href="/about" class="about-link">About This Project</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
